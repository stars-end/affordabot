# AffordaBot - Root Railway Configuration
# Individual services have their own railway.toml files
#
# NOTE: Cron scheduling has migrated to Windmill (bd-s8id.3).
# Railway cron entries removed. See ops/windmill/README.md for the
# current scheduling setup and docs/CRON_ARCHITECTURE.md for details.

[build]
builder = "RAILPACK"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
