summary: Affordabot manual substrate expansion
description: >
  Manual broad substrate expansion trigger. Runs on demand with an explicit
  manifest and posts to /cron/manual-substrate-expansion.
value:
  modules:
  - id: a
    value:
      type: script
      input_transforms:
        endpoint:
          type: static
          value: manual-substrate-expansion
        backend_url:
          type: static
          value: $var:f/affordabot/BACKEND_PUBLIC_URL
        cron_secret:
          type: static
          value: $var:f/affordabot/CRON_SECRET
        env:
          type: static
          value: dev
        timeout_seconds:
          type: static
          value: 7200
        slack_webhook_url:
          type: static
          value: $var:f/affordabot/SLACK_WEBHOOK_URL
        payload:
          type: static
          value:
            run_label: ${flow.run_label}
            jurisdictions: ${flow.jurisdictions}
            asset_classes: ${flow.asset_classes}
            max_documents_per_source: ${flow.max_documents_per_source}
            run_mode: ${flow.run_mode}
            ocr_mode: ${flow.ocr_mode}
            sample_size_per_bucket: ${flow.sample_size_per_bucket}
            notes: ${flow.notes}
      path: f/affordabot/trigger_cron_job
      retry:
        attempts: 2
        backoff:
          initial_interval: 120
          max_interval: 900
          multiplier: 2
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  required:
    - run_label
    - jurisdictions
    - asset_classes
    - max_documents_per_source
    - run_mode
    - ocr_mode
    - sample_size_per_bucket
  properties:
    run_label:
      type: string
      description: Operator-provided label for this manual expansion run.
    jurisdictions:
      type: array
      description: Jurisdiction slugs/names to include in this run.
      items:
        type: string
      minItems: 1
    asset_classes:
      type: array
      description: Asset classes to capture for each selected jurisdiction.
      items:
        type: string
      minItems: 1
    max_documents_per_source:
      type: integer
      minimum: 1
      maximum: 100
      description: Hard cap per source for this manual run.
    run_mode:
      type: string
      enum:
        - capture_only
        - capture_and_ingest
    ocr_mode:
      type: string
      enum:
        - off
        - hard_doc_only
    sample_size_per_bucket:
      type: integer
      minimum: 1
      maximum: 10
      description: Number of rows to include in per-bucket manual review samples.
    notes:
      type: string
      description: Optional operator notes for this run.
concurrency:
  limit: 1
  key: affordabot-manual-substrate-expansion
ws_error_handler_muted: false
