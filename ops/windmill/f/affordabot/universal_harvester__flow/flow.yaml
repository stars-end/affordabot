summary: Affordabot universal harvester
description: Schedule daily at 08:00 UTC. Triggers the backend universal harvester cron endpoint.
value:
  modules:
  - id: a
    value:
      type: script
      input_transforms:
        endpoint:
          type: static
          value: universal-harvester
        backend_url:
          type: static
          value: $var:f/affordabot/BACKEND_PUBLIC_URL
        cron_secret:
          type: static
          value: $var:f/affordabot/CRON_SECRET
        env:
          type: static
          value: dev
        timeout_seconds:
          type: static
          value: 7200
        slack_webhook_url:
          type: static
          value: $var:f/affordabot/SLACK_WEBHOOK_URL
      path: f/affordabot/trigger_cron_job
      retry:
        attempts: 3
        backoff:
          initial_interval: 60
          max_interval: 900
          multiplier: 2
concurrency:
  limit: 1
  key: affordabot-cron
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order: []
  properties: {}
  required: []
ws_error_handler_muted: false
